  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    :root { --primary: #059669; --primary-hover: #047857; --bg-app: #f8fafc; --white: #ffffff; --text-dark: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0; }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin: 0; padding: 0; background-color: var(--bg-app); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* LOGIN UI */
  
    #loginSection { position: fixed; inset: 0; background: linear-gradient(135deg, #064e3b 0%, #065f46 40%, #059669 70%, #34d399 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .login-container { background: var(--white); padding: 0; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); width: 100%; max-width: 520px; text-align: center; overflow: hidden; }
    .login-header { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
    .login-body { padding: 24px 32px 32px; }
    .form-control-green { border-color: #d1fae5 !important; }
    .form-control-green:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 4px rgba(5,150,105,0.1) !important; }
    .saved-accounts-box { text-align: left; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
    .account-card { display: flex; justify-content: space-between; align-items: center; background: #ecfdf5; padding: 12px 16px; border: 1px solid #a7f3d0; border-radius: 10px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
    .form-group { text-align: left; margin-bottom: 20px; position: relative; width: 100%; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-dark); }
    .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 15px; outline: none; transition: all 0.3s ease; background: #f8fafc; }
    .form-control:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
    .password-wrapper { position: relative; width: 100%; }
    .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 18px; transition: 0.2s; z-index: 5; }

    /* LAYOUT & SIDEBAR */
    #sidebar { width: 270px; background: var(--white); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; box-shadow: 4px 0 15px rgba(0,0,0,0.02); }
    .sidebar-brand { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
    .sidebar-brand h3 { margin: 12px 0 0; color: var(--primary); font-size: 20px; font-weight: 700; }
    .navigation-menu { list-style: none; padding: 15px 10px; margin: 0; flex: 1; overflow-y: auto; }
    .navigation-menu li a { display: flex; align-items: center; padding: 14px 20px; color: var(--text-muted); text-decoration: none; font-weight: 500; cursor: pointer; border-radius: 10px; transition: 0.2s; margin-bottom: 4px; }
    .navigation-menu li a i { width: 26px; font-size: 18px; }
    .navigation-menu li a:hover, .navigation-menu li a.active { background: #ecfdf5; color: var(--primary); font-weight: 600; }
    .nav-label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: 700; margin: 15px 0 5px 20px; letter-spacing: 0.5px; }
    #main-content { flex: 1; overflow-y: auto; padding: 40px; background: var(--bg-app); }

    /* DASHBOARD ELEMENTS */
    .dashboard-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .metric-card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border-left: 5px solid var(--primary); position: relative; overflow: hidden; }
    .metric-card h2 { margin: 0; font-size: 32px; color: var(--text-dark); font-weight: 700; }
    .metric-card p { margin: 6px 0 0; font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .app-card { background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 25px; border: 1px solid rgba(226, 232, 240, 0.8); }
    .app-card-title { display: flex; justify-content: space-between; align-items: center; margin-top: 0; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
    .app-card-title h3 { margin: 0; font-size: 18px; color: var(--text-dark); }
    
    /* BUTTONS & TABLES */
    .btn-action { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.2); }
    .btn-action:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-action:disabled { background: #94a3b8 !important; cursor: not-allowed; transform: none !important; box-shadow: none; }
    .btn-outline { padding: 10px 16px; background: var(--white); border: 1.5px solid var(--border-color); color: var(--text-dark); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 6px; color: var(--text-muted); border-radius: 6px; transition: 0.2s; }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; text-align: left; }
    th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); vertical-align: top; }
    th { background: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
    
    /* WARNA STATUS */
    .badge-status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; display: inline-block; text-align: center; }
    .bg-blue { background-color: #3b82f6 !important; } 
    .bg-green { background-color: #10b981 !important; }
    .bg-yellow { background-color: #f59e0b !important; color: #fff !important; } 
    .bg-red { background-color: #ef4444 !important; } 
    .bg-black { background-color: #0f172a !important; color: #fff !important; }
    .badge-pending { background-color: #f59e0b; } .badge-diterima { background-color: #10b981; }

    .welcome-banner { background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%); border-radius: 16px; padding: 30px; color: white; margin-bottom: 30px; position: relative; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(5, 150, 105, 0.4); }
    .welcome-banner h2 { margin: 0 0 10px 0; font-size: 26px; }
    .welcome-banner p { margin: 0; font-size: 15px; opacity: 0.9; line-height: 1.5; max-width: 800px; }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    .modal-box { background: var(--white); padding: 35px; border-radius: 16px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
  </style>
